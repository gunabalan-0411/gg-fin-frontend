<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <title>gg fin — Open Graph / Social Card</title>
  <defs>
    <linearGradient id="fstem" x1="0.3" y1="1" x2="0.7" y2="0">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="wl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <radialGradient id="bg" cx="30%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0F2D24"/>
      <stop offset="100%" stop-color="#050F0C"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00A896" stroke-width="0.4" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="4" height="630" fill="#00A896" opacity="0.6"/>
  <!-- scale≈2.05; stroke-width=13.5/2.05≈6.59 → visual stroke proportional to reference -->
  <g transform="translate(62, 86) scale(2.05)" stroke-width="6.59" stroke-linecap="round">
    <circle cx="60" cy="60" r="50" fill="none" stroke="#00A896"/>
    <line x1="110" y1="60" x2="110" y2="135" stroke="#00A896"/>
    <circle cx="92" cy="146" r="36" fill="none" stroke="#00796B"/>
    <line x1="128" y1="146" x2="128" y2="200" stroke="#00796B"/>
    <circle cx="79" cy="110" r="6.5" fill="#00A896" stroke="none"/>
    <line x1="140" y1="232" x2="200" y2="18" stroke="url(#fstem)"/>
    <line x1="200" y1="18" x2="232" y2="14" stroke="#1565C0"/>
    <line x1="170" y1="125" x2="196" y2="121" stroke="#4FC3F7"/>
  </g>
  <line x1="560" y1="120" x2="560" y2="510" stroke="#00A896" stroke-width="1" opacity="0.25"/>
  <text x="620" y="260" text-anchor="start"
        font-family="'Palatino Linotype', Palatino, Georgia, serif"
        font-size="96" fill="#FAF9F5" letter-spacing="22">gg</text>
  <line x1="620" y1="285" x2="900" y2="285" stroke="url(#wl)" stroke-width="2"/>
  <text x="624" y="330" text-anchor="start"
        font-family="'Palatino Linotype', Palatino, Georgia, serif"
        font-size="36" fill="#00A896" letter-spacing="24">fin</text>
  <text x="622" y="400" text-anchor="start"
        font-family="Georgia, serif"
        font-size="16" fill="#FAF9F5" letter-spacing="3" opacity="0.5">PERSONAL FINANCE MANAGEMENT</text>
  <text x="1180" y="620" text-anchor="end"
        font-family="Georgia, serif"
        font-size="10" fill="#FAF9F5" letter-spacing="2" opacity="0.2">gg fin</text>
</svg>
